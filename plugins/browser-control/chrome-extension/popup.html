<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* Dark theme matching Talon's design */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
    }
    /* Header */
    .header { padding: 10px 14px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .header h1 { font-size: 14px; font-weight: 600; flex: 1; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.connected { background: #4ade80; }
    .status-dot.disconnected { background: #f87171; }
    .header-btn { background: none; border: none; color: #a0a0c0; cursor: pointer; padding: 4px; font-size: 16px; }
    .header-btn:hover { color: #e0e0e0; }

    /* Messages area */
    .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 90%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #e06050; color: white; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: #2a2a4a; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: transparent; color: #606080; font-size: 11px; text-align: center; }
    .msg.tool { align-self: flex-start; background: #1a2a3a; color: #60a5fa; font-size: 11px; border-radius: 8px; font-family: monospace; }
    .msg .tool-name { font-weight: 600; color: #60a5fa; }
    .msg .tool-result { color: #a0a0c0; margin-top: 4px; }

    /* Streaming indicator */
    .typing { align-self: flex-start; color: #606080; font-size: 12px; padding: 4px 12px; }
    .typing::after { content: '...'; animation: dots 1.5s infinite; }
    @keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }

    /* Permission prompt */
    .permission { background: #2a2a3a; border: 1px solid #e06050; border-radius: 10px; padding: 10px; margin: 4px 0; }
    .permission-title { font-weight: 600; color: #e06050; font-size: 12px; margin-bottom: 6px; }
    .permission-detail { font-family: monospace; font-size: 11px; color: #a0a0c0; margin-bottom: 8px; white-space: pre-wrap; max-height: 80px; overflow-y: auto; }
    .permission-btns { display: flex; gap: 6px; }
    .permission-btns button { flex: 1; padding: 6px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
    .btn-allow { background: #4ade80; color: #1a1a2e; }
    .btn-deny { background: #f87171; color: white; }

    /* Context bar */
    .context-bar { padding: 6px 14px; background: #1a2a3a; border-top: 1px solid #2a2a4a; font-size: 11px; color: #60a5fa; display: none; align-items: center; gap: 6px; flex-shrink: 0; }
    .context-bar.visible { display: flex; }
    .context-bar .context-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .context-bar .close-ctx { cursor: pointer; color: #a0a0c0; }

    /* Input area */
    .input-area { padding: 10px 14px; border-top: 1px solid #2a2a4a; display: flex; gap: 8px; flex-shrink: 0; align-items: flex-end; }
    .input-area textarea { flex: 1; background: #2a2a4a; color: #e0e0e0; border: 1px solid #3a3a5a; border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: none; outline: none; max-height: 80px; min-height: 34px; }
    .input-area textarea:focus { border-color: #e06050; }
    .input-area button { background: #e06050; color: white; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .input-area button:hover { background: #c04030; }
    .input-area button:disabled { background: #3a3a5a; color: #606080; cursor: not-allowed; }
    .input-area .ctx-btn { background: none; border: 1px solid #3a3a5a; color: #a0a0c0; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .input-area .ctx-btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .input-area .ctx-btn.active { border-color: #60a5fa; color: #60a5fa; background: #1a2a3a; }

    /* Empty state */
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #606080; gap: 8px; }
    .empty-icon { font-size: 32px; }
    .empty-text { font-size: 13px; text-align: center; max-width: 280px; line-height: 1.5; }

    /* Markdown in messages */
    .msg.assistant code { background: #1a2a3a; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: 'SF Mono', Menlo, monospace; }
    .msg.assistant pre { background: #0f172a; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 6px 0; font-size: 12px; }
    .msg.assistant pre code { background: none; padding: 0; }
    .msg.assistant strong { font-weight: 700; }
    .msg.assistant em { font-style: italic; }
    .msg.assistant a { color: #60a5fa; text-decoration: none; }
    .msg.assistant a:hover { text-decoration: underline; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 18px; margin: 4px 0; }
    .msg.assistant li { margin: 2px 0; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { font-weight: 700; margin: 8px 0 4px; }
    .msg.assistant h1 { font-size: 16px; }
    .msg.assistant h2 { font-size: 14px; }
    .msg.assistant h3 { font-size: 13px; }
    .msg.assistant blockquote { border-left: 3px solid #3a3a5a; padding-left: 8px; color: #a0a0c0; margin: 4px 0; }
    .msg.assistant table { border-collapse: collapse; margin: 6px 0; font-size: 12px; }
    .msg.assistant th, .msg.assistant td { border: 1px solid #3a3a5a; padding: 4px 8px; }
    .msg.assistant th { background: #1a2a3a; }

    /* Cursor blink */
    .cursor { display: inline-block; width: 2px; height: 14px; background: #e06050; animation: blink 0.8s infinite; vertical-align: text-bottom; margin-left: 2px; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>Talon</h1>
    <button class="header-btn" id="newChatBtn" title="New chat">+</button>
    <button class="header-btn" id="settingsBtn" title="Settings">&#9881;</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty">
      <div class="empty-icon">&#129413;</div>
      <div class="empty-text">Ask anything. I can see and interact with your current browser tab.</div>
    </div>
  </div>

  <div class="context-bar" id="contextBar">
    <span>&#128206;</span>
    <span class="context-text" id="contextText"></span>
    <span class="close-ctx" id="closeContext">&#10005;</span>
  </div>

  <div class="input-area">
    <button class="ctx-btn" id="attachCtxBtn" title="Attach page context">&#128206;</button>
    <textarea id="input" placeholder="Ask Talon..." rows="1"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
