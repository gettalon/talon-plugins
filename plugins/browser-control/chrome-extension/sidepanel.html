<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Talon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252540;
      --border: #2a2a4a;
      --text-primary: #e8e8f0;
      --text-secondary: #a0a0c0;
      --text-muted: #606080;
      --accent: #e06050;
      --accent-hover: #c84840;
      --blue: #60a5fa;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
    }
    body {
      width: 100%; height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-primary);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .header-logo {
      width: 24px; height: 24px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: white;
    }
    .header h1 { font-size: 15px; font-weight: 600; flex: 1; }
    .status-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      display: flex; align-items: center; gap: 4px;
    }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-badge.connected { background: rgba(74,222,128,0.15); color: var(--green); }
    .status-badge.connected .dot { background: var(--green); }
    .status-badge.disconnected { background: rgba(248,113,113,0.15); color: var(--red); }
    .status-badge.disconnected .dot { background: var(--red); }
    .header-btn {
      background: none; border: none; color: var(--text-secondary);
      cursor: pointer; padding: 6px; font-size: 16px; border-radius: 6px;
      transition: background 0.15s;
    }
    .header-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--text-muted); padding: 40px 20px;
    }
    .empty-icon { font-size: 40px; opacity: 0.6; }
    .empty-text { font-size: 14px; text-align: center; line-height: 1.6; max-width: 260px; }
    .empty-hint { font-size: 11px; color: var(--text-muted); }

    /* Message bubbles */
    .msg-group { display: flex; flex-direction: column; gap: 4px; }
    .msg-group .msg-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 0 4px;
    }
    .msg-group.user .msg-label { color: var(--accent); align-self: flex-end; }
    .msg-group.assistant .msg-label { color: var(--blue); }

    .msg {
      max-width: 92%; padding: 10px 14px; border-radius: 14px;
      font-size: 13px; line-height: 1.5; word-wrap: break-word;
    }
    .msg-group.user .msg {
      align-self: flex-end; background: var(--accent); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-group.assistant .msg {
      align-self: flex-start; background: var(--bg-secondary); color: var(--text-primary);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .msg-group.system .msg {
      align-self: center; background: transparent; color: var(--text-muted);
      font-size: 11px; text-align: center;
    }

    /* Tool calls */
    .tool-call {
      align-self: flex-start; background: var(--bg-secondary);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 12px; font-size: 12px; max-width: 92%;
    }
    .tool-call-header {
      display: flex; align-items: center; gap: 6px;
      color: var(--blue); font-weight: 600; cursor: pointer;
    }
    .tool-call-header .tool-icon { font-size: 14px; }
    .tool-call-body {
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px; color: var(--text-secondary);
      margin-top: 6px; white-space: pre-wrap; word-break: break-all;
      max-height: 120px; overflow-y: auto;
      display: none;
    }
    .tool-call.expanded .tool-call-body { display: block; }
    .tool-result-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
      margin-left: auto;
    }
    .tool-result-badge.success { background: rgba(74,222,128,0.15); color: var(--green); }
    .tool-result-badge.error { background: rgba(248,113,113,0.15); color: var(--red); }

    /* Permission request */
    .permission-card {
      background: var(--bg-secondary); border: 1px solid var(--accent);
      border-radius: 12px; padding: 12px; margin: 4px 0; max-width: 92%;
    }
    .permission-title {
      font-weight: 600; color: var(--accent); font-size: 12px;
      margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
    }
    .permission-detail {
      font-family: 'SF Mono', Menlo, monospace; font-size: 11px;
      color: var(--text-secondary); margin-bottom: 10px;
      white-space: pre-wrap; max-height: 100px; overflow-y: auto;
      background: var(--bg-primary); padding: 8px; border-radius: 6px;
    }
    .permission-btns { display: flex; gap: 8px; }
    .permission-btns button {
      flex: 1; padding: 8px; border-radius: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .permission-btns button:hover { opacity: 0.85; }
    .btn-allow { background: var(--green); color: var(--bg-primary); }
    .btn-deny { background: var(--red); color: white; }

    /* Streaming indicator */
    .streaming-indicator {
      display: none; align-self: flex-start;
      padding: 4px 12px; color: var(--text-muted); font-size: 12px;
    }
    .streaming-indicator.visible { display: flex; align-items: center; gap: 6px; }
    .streaming-dots span {
      display: inline-block; width: 4px; height: 4px;
      background: var(--text-muted); border-radius: 50%;
      animation: dotPulse 1.4s infinite ease-in-out both;
    }
    .streaming-dots span:nth-child(1) { animation-delay: -0.32s; }
    .streaming-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Context bar ── */
    .context-bar {
      padding: 8px 16px; background: rgba(96,165,250,0.08);
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--blue);
      display: none; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .context-bar.visible { display: flex; }
    .context-bar .ctx-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .context-bar .ctx-close { cursor: pointer; color: var(--text-secondary); padding: 2px; }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-shrink: 0;
      align-items: flex-end; background: var(--bg-secondary);
    }
    .input-area textarea {
      flex: 1; background: var(--bg-tertiary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 12px; font-size: 13px; font-family: inherit;
      resize: none; outline: none; max-height: 100px; min-height: 38px;
      transition: border-color 0.15s;
    }
    .input-area textarea:focus { border-color: var(--accent); }
    .input-area textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      background: var(--accent); color: white; border: none;
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      font-size: 13px; font-weight: 600; flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { background: var(--bg-tertiary); color: var(--text-muted); cursor: not-allowed; }
    .ctx-btn {
      background: none; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px; border-radius: 10px; cursor: pointer; font-size: 14px;
      transition: all 0.15s;
    }
    .ctx-btn:hover { border-color: var(--blue); color: var(--blue); }
    .ctx-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(96,165,250,0.08); }

    /* ── Markdown in assistant messages ── */
    .msg code {
      background: var(--bg-primary); padding: 1px 5px; border-radius: 4px;
      font-size: 12px; font-family: 'SF Mono', Menlo, Consolas, monospace;
    }
    .msg pre {
      background: var(--bg-primary); padding: 10px; border-radius: 8px;
      overflow-x: auto; margin: 6px 0; font-size: 12px;
      border: 1px solid var(--border);
    }
    .msg pre code { background: none; padding: 0; }
    .msg strong { font-weight: 700; }
    .msg em { font-style: italic; }
    .msg a { color: var(--blue); text-decoration: none; }
    .msg a:hover { text-decoration: underline; }
    .msg ul, .msg ol { padding-left: 20px; margin: 4px 0; }
    .msg li { margin: 2px 0; }
    .msg h1, .msg h2, .msg h3 { font-weight: 700; margin: 8px 0 4px; }
    .msg h1 { font-size: 16px; }
    .msg h2 { font-size: 14px; }
    .msg h3 { font-size: 13px; }
    .msg blockquote {
      border-left: 3px solid var(--border); padding-left: 10px;
      color: var(--text-secondary); margin: 4px 0;
    }
    .msg table { border-collapse: collapse; margin: 6px 0; font-size: 12px; }
    .msg th, .msg td { border: 1px solid var(--border); padding: 4px 8px; }
    .msg th { background: var(--bg-tertiary); }

    /* Cursor blink */
    .cursor {
      display: inline-block; width: 2px; height: 14px;
      background: var(--accent); animation: blink 0.8s infinite;
      vertical-align: text-bottom; margin-left: 2px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">T</div>
    <h1>Talon</h1>
    <div class="status-badge disconnected" id="statusBadge">
      <span class="dot"></span>
      <span id="statusText">Offline</span>
    </div>
    <button class="header-btn" id="newChatBtn" title="New chat">+</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">&#129413;</div>
      <div class="empty-text">Ask anything. I can see and interact with your current browser tab.</div>
      <div class="empty-hint">Connected to Talon Desktop</div>
    </div>
  </div>

  <div class="streaming-indicator" id="streamingIndicator">
    <div class="streaming-dots"><span></span><span></span><span></span></div>
    <span>Thinking</span>
  </div>

  <div class="context-bar" id="contextBar">
    <span>&#128206;</span>
    <span class="ctx-text" id="contextText"></span>
    <span class="ctx-close" id="closeContext">&#10005;</span>
  </div>

  <div class="input-area">
    <button class="ctx-btn" id="attachCtxBtn" title="Attach page context">&#128206;</button>
    <textarea id="input" placeholder="Ask Talon..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
